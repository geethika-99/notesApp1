<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Notes App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>📓 Student Notes</h1>

    <!-- ADD NOTE FORM -->
    <div class="form-card">
      <h2>Add New Note</h2>
      <input type="text" id="titleInput" placeholder="Note title..." />
      <textarea id="contentInput" placeholder="Write your note here..."></textarea>
      <button onclick="addNote()">Add Note</button>
      <p id="formMsg" class="msg"></p>
    </div>

    <!-- NOTES LIST -->
    <div class="notes-section">
      <h2>My Notes</h2>
      <div id="notesList">
        <p class="empty">Loading notes...</p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
