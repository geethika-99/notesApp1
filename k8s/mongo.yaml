# ──────────────────────────────────────────────────────────────
# MongoDB Persistent Volume Claim
# Requests 1GB of storage to persist database data
# ──────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# ──────────────────────────────────────────────────────────────
# MongoDB Deployment
# Runs 1 MongoDB container using the official mongo:7 image
# ──────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-deployment
  labels:
    app: mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db   # MongoDB stores data here
      volumes:
        - name: mongo-storage
          persistentVolumeClaim:
            claimName: mongo-pvc

---
# ──────────────────────────────────────────────────────────────
# MongoDB Service
# ClusterIP = only accessible inside the cluster (by backend)
# ──────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: mongo   # backend uses this name in MONGO_URI
spec:
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP
